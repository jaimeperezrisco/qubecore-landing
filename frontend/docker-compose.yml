# ===================================
# QubeCore Frontend - Docker Compose (Local Dev)
# ===================================

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qubecore-frontend
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    stdin_open: true
    tty: true
    command: npm run dev -- --host